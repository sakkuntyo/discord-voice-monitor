<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Discord Voice Monitor</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="players-section" data-section="players">
        <div id="memberList" class="member-list"></div>
      </section>

      <section class="controls-section">
        <div class="section-actions">
          <button id="settingsToggle" class="toggle-button" type="button" aria-pressed="false">
            Settings ON
          </button>
          <span id="updatedAt" class="subtle">&#26410;&#21463;&#20449;</span>
        </div>
      </section>

      <section class="settings-section" data-section="settings">
        <div class="settings-panel">
          <div class="settings-row">
            <span class="settings-label">layout :</span>
            <label class="layout-picker">
              <span class="visually-hidden">Layout</span>
              <select id="layoutSelect" class="layout-select">
                <option value="default">Debug</option>
                <option value="overlay">Overlay</option>
                <option value="dad">Dad</option>
              </select>
            </label>
          </div>
          <div class="settings-row">
            <span class="settings-label">background :</span>
            <label class="color-picker">
              <span class="visually-hidden">Background color</span>
              <input id="backgroundColorInput" class="color-input" type="color" value="#07111f" />
            </label>
          </div>
          <div class="settings-row overlay-setting dad-shared">
            <span class="settings-label">overlay gap :</span>
            <label class="range-picker">
              <span class="visually-hidden">Overlay gap</span>
              <input id="overlayGapInput" class="range-input" type="range" min="-40" max="40" step="1" value="18" />
            </label>
            <span id="overlayGapValue" class="settings-value">18px</span>
          </div>
          <div class="settings-row overlay-setting dad-shared">
            <span class="settings-label">overlay name :</span>
            <button id="overlayNameToggle" class="toggle-button" type="button" aria-pressed="true">
              Name ON
            </button>
          </div>
          <div class="settings-row">
            <span class="settings-label">name font :</span>
            <label class="layout-picker">
              <span class="visually-hidden">Name font</span>
              <select id="nameFontSelect" class="layout-select">
                <option value="ui">UI Sans</option>
                <option value="gothic">Japanese Gothic</option>
                <option value="rounded">Rounded</option>
                <option value="serif">Serif</option>
                <option value="mono">Monospace</option>
              </select>
            </label>
          </div>
          <div class="settings-row overlay-setting">
            <span class="settings-label">icon ring :</span>
            <button id="overlayRingToggle" class="toggle-button" type="button" aria-pressed="true">
              Ring ON
            </button>
          </div>
          <div class="settings-row overlay-setting">
            <span class="settings-label">ring width :</span>
            <label class="range-picker">
              <span class="visually-hidden">Ring width</span>
              <input id="overlayRingWidthInput" class="range-input" type="range" min="0" max="18" step="1" value="6" />
            </label>
            <span id="overlayRingWidthValue" class="settings-value">6px</span>
          </div>
          <div class="settings-row overlay-setting">
            <span class="settings-label">overlap order :</span>
            <label class="layout-picker">
              <span class="visually-hidden">Overlap order</span>
              <select id="overlayStackSelect" class="layout-select">
                <option value="right-on-top">Right on Top</option>
                <option value="left-on-top">Left on Top</option>
              </select>
            </label>
          </div>
          <div class="settings-row overlay-setting">
            <span class="settings-label">self position :</span>
            <label class="layout-picker">
              <span class="visually-hidden">Self position</span>
              <select id="selfPositionSelect" class="layout-select">
                <option value="natural">Natural</option>
                <option value="left">Left</option>
                <option value="right">Right</option>
              </select>
            </label>
          </div>
          <div class="settings-row dad-setting">
            <span class="settings-label">user image :</span>
            <button id="dadAvatarToggle" class="toggle-button" type="button" aria-pressed="true">
              Avatar ON
            </button>
          </div>
          <div class="settings-row">
            <span class="settings-label">summary :</span>
            <button id="summaryTogglePanel" class="toggle-button" type="button" aria-pressed="false">
              Info ON
            </button>
          </div>
          <section class="summary-section" data-section="summary">
            <section class="summary-list">
              <div class="summary-row">
                <span class="summary-key">connected voice channel :</span>
                <span id="channelLabel" class="summary-value">VC &#26410;&#25509;&#32154;</span>
              </div>
              <div class="summary-row">
                <span class="summary-key">connected members count :</span>
                <span id="memberCount" class="summary-value">0</span>
              </div>
              <div class="summary-row">
                <span class="summary-key">speaking members count :</span>
                <span id="speakingCount" class="summary-value">0</span>
              </div>
            </section>
          </section>
        </div>
      </section>
    </main>

    <template id="memberItemTemplate">
      <article class="member-card">
        <div class="avatar-wrap">
          <img class="avatar" alt="" />
          <span class="speaking-dot"></span>
        </div>
        <div class="member-copy">
          <div class="name-row">
            <strong class="display-name"></strong>
          </div>
          <p class="secondary-line"></p>
        </div>
        <div class="state-pill"></div>
      </article>
    </template>

    <script src="./renderer.js"></script>
  </body>
  </html>
